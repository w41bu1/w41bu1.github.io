<script>
    document.addEventListener("DOMContentLoaded", function () {
        const overlay = document.getElementById('chirpy-lightbox');
        const overlayImg = document.getElementById('chirpy-lightbox-img');
        const overlayCaption = document.getElementById('chirpy-lightbox-caption');
        const zoomInBtn = document.getElementById('zoom-in');
        const zoomOutBtn = document.getElementById('zoom-out');

        let scale = 1;

        document.querySelectorAll('article img').forEach(img => {
            img.style.cursor = 'zoom-in';
            img.addEventListener('click', () => {
                overlayImg.src = img.src;
                overlayCaption.textContent = img.alt || '';
                overlay.classList.add('active');
                scale = 1;
                overlayImg.style.transform = `scale(${scale})`;
            });
        });

        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) {
                overlay.classList.remove('active');
                overlayImg.src = '';
                overlayCaption.textContent = '';
            }
        });

        zoomInBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            scale = Math.min(scale + 0.2, 3);
            overlayImg.style.transform = `scale(${scale})`;
        });

        zoomOutBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            scale = Math.max(scale - 0.2, 0.5);
            overlayImg.style.transform = `scale(${scale})`;
        });
    });
</script>
